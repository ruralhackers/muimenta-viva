<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convocatoria Muimenta Viva 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Lora', serif;
            background-color: #ffffff;
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 1200px;
            padding: 0 20px;
        }
        
        h1 {
            font-family: 'Lora', serif;
            font-size: 3rem;
            font-weight: 400;
            text-align: center;
            letter-spacing: -0.02em;
            line-height: 1.2;
            color: #1a1a1a;
            margin-bottom: 3rem;
        }
        
        .links-row {
            display: flex;
            gap: 2rem;
            justify-content: center;
            align-items: stretch;
        }
        
        .link-card {
            flex: 1;
            max-width: 400px;
            text-align: center;
            display: flex;
        }
        
        .link-card a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 2rem 1.5rem;
            background-color: #1a1a1a;
            color: #ffffff;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-size: 1.125rem;
            font-weight: 500;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }
        
        .link-card a:hover {
            background-color: #333;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
                margin-bottom: 2rem;
            }
            
            .links-row {
                gap: 1rem;
            }
        }
        
        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }
            
            .link-card a {
                font-size: 0.9rem;
                padding: 1.5rem 0.75rem;
            }
        }
        
        .logos-section {
            margin-top: 5rem;
            padding-top: 3rem;
            border-top: 1px solid #e5e5e5;
        }
        
        .logos-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
            align-items: center;
            justify-items: center;
        }
        
        .logo-item {
            width: 100%;
            max-width: 100px;
        }
        
        .logo-item img {
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: grayscale(100%);
            opacity: 0.7;
            transition: all 0.3s ease;
        }
        
        .logo-item img:hover {
            filter: grayscale(0%);
            opacity: 1;
        }
        
        @media (max-width: 768px) {
            .logos-section {
                margin-top: 3rem;
                padding-top: 2rem;
            }
            
            .logos-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5rem;
            }
            
            .logo-item {
                max-width: 75px;
            }
        }
        
        @media (max-width: 480px) {
            .logos-grid {
                gap: 1rem;
            }
            
            .logo-item {
                max-width: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Convocatoria Muimenta Viva 2026</h1>
        
        <div class="links-row">
            <div class="link-card">
                <a href="https://forms.gle/uvxspZ3MtMnY6Y8z5" target="_blank">
                    Persoa Residente Permanente
                </a>
            </div>
            <div class="link-card">
                <a href="https://forms.gle/46akEhDx75zfwCs66" target="_blank">
                    Residente Temporal
                </a>
            </div>
        </div>
        
        <div class="logos-section">
            <div class="logos-grid">
                <div class="logo-item">
                    <a href="https://emprego.xunta.gal/" target="_blank">
                        <img src="https://emprego.xunta.gal/portal/templates/emprego/css/img/logo_emprego.png" alt="Consellería de Emprego - Xunta de Galicia">
                    </a>
                </div>
                <div class="logo-item">
                    <a href="http://fundacionria.org/" target="_blank">
                        <img src="https://fundacionria.org/wp-content/uploads/2024/06/RIA.svg" alt="Fundación RIA">
                    </a>
                </div>
                <div class="logo-item">
                    <a href="https://sende.co" target="_blank">
                        <img src="sende.svg" alt="Sende">
                    </a>
                </div>
                <div class="logo-item">
                    <a href="https://anceu.com" target="_blank">
                        <img src="https://anceu.com/wp-content/uploads/2022/06/cropped-Anceu-Coliving-Logo_Monogram-02.png" alt="Anceu Coliving">
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
